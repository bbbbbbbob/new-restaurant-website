worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Browser tab icon at site root
    location = /favicon.ico {
      alias /usr/share/nginx/html/assets/brand/logo.jpg;
      access_log off;
      expires 7d;
    }

    # Serve nested pages such as /menu/ and /location/
    location / {
      try_files $uri $uri/ $uri/index.html =404;
    }

    # Cache static assets; HTML stays fresh for content updates.
    location ~* \.(jpg|jpeg|png|gif|webp|svg|css|js|ico)$ {
      expires 7d;
      add_header Cache-Control "public";
      try_files $uri =404;
    }
  }
}
